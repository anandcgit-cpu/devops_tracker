<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DevOps Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DevOps Tracker">
<meta name="theme-color" content="#0F6E56">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;padding:env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,16px);color:#1a1a18;min-height:100vh}
#app{max-width:720px;margin:0 auto;background:#fff;border-radius:16px;padding:20px;border:0.5px solid #d3d1c7}
@media(max-width:480px){body{padding:12px 10px}#app{border-radius:12px;padding:14px}}
h1{font-size:18px;font-weight:500;margin-bottom:4px;color:#1a1a18}
.subtitle{font-size:12px;color:#5f5e5a;margin-bottom:16px}
.top-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.phase-pill{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap}
.phase-pill.active{border-color:currentColor}
.p1{background:#E1F5EE;color:#085041}.p2{background:#EEEDFE;color:#3C3489}
.p3{background:#FAEEDA;color:#633806}.p4{background:#FAECE7;color:#4A1B0C}
.p5{background:#E6F1FB;color:#042C53}.p6{background:#FBEAF0;color:#72243E}
.phase-hero{border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid transparent}
.phase-hero-title{font-size:15px;font-weight:500;margin-bottom:2px}
.phase-hero-meta{font-size:12px;opacity:.75;margin-bottom:10px}
.stats-row{display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
.weeks-grid{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.week-block{border-radius:10px;overflow:hidden;border:0.5px solid #d3d1c7}
.week-header-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;background:#f5f5f0;user-select:none}
.week-title{font-size:12px;font-weight:500;color:#1a1a18}
.week-subtitle{font-size:11px;color:#5f5e5a}
.week-toggle{font-size:11px;color:#888780}
.days-list{display:none;flex-direction:column}
.days-list.open{display:flex}
.day-item{display:grid;grid-template-columns:38px 1fr auto;gap:8px;align-items:start;padding:8px 12px;border-top:0.5px solid #e8e6e0;transition:opacity .2s}
.day-label{font-size:11px;font-weight:500;color:#5f5e5a;padding-top:2px}
.day-topic{font-size:12px;font-weight:500;color:#1a1a18;margin-bottom:2px}
.day-detail{font-size:11px;color:#5f5e5a;line-height:1.5}
.day-link{color:#185FA5;font-size:11px;text-decoration:none}
.day-link:hover{text-decoration:underline}
.done-btn{font-size:10px;padding:3px 8px;border-radius:99px;border:0.5px solid #b4b2a9;background:transparent;cursor:pointer;color:#5f5e5a;white-space:nowrap;transition:all .15s;margin-top:2px}
.done-btn.done{background:#eaf3de;color:#3B6D11;border-color:#639922}
.progress-wrap{margin-bottom:16px}
.progress-label{font-size:12px;color:#5f5e5a;margin-bottom:5px;display:flex;justify-content:space-between}
.progress-track{background:#f5f5f0;border-radius:99px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s}
@media(prefers-color-scheme:dark){
  body{background:#1a1a18;color:#e8e6e0}
  #app{background:#2c2c2a;border-color:#444441}
  .week-header-row,.progress-track{background:#3d3d3a}
  .day-item{border-top-color:#444441}
  .week-block{border-color:#444441}
  .week-title,.day-topic{color:#e8e6e0}
  .week-subtitle,.day-detail,.day-label,.progress-label{color:#9c9a92}
  .done-btn{color:#9c9a92;border-color:#5f5e5a}
  h1{color:#e8e6e0}.subtitle{color:#9c9a92}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbw2k1uuZ152jDmmGRzs6mw0fTFs6GBmxNjB-NnrGb2-v1jLN66kLr-_EoGY_C9QYwWh/exec';

const PHASES=[
{id:'p1',label:'Phase 1',name:'Linux & Git fundamentals',months:'Month 1–2 (Weeks 1–8)',color:'#0F6E56',bg:'#E1F5EE',tc:'#085041',
stats:['Linux CLI mastery','Git & GitHub','Shell scripting','OverTheWire + labs'],
weeks:[
{label:'Week 1',topic:'Linux basics — filesystem, navigation, permissions',days:[
{d:'Mon',t:'What is Linux + distributions overview',det:'Watch TechWorld with Nana Linux intro. Understand kernel, distros.',url:'https://www.youtube.com/watch?v=ROjZy1WbCIA'},
{d:'Tue',t:'Linux filesystem hierarchy + navigation',det:'cd, ls, pwd, find, tree. Navigate without GUI.',url:'https://linuxjourney.com'},
{d:'Wed',t:'File permissions + ownership + chmod',det:'chmod 755, chown, chgrp. Create files and set permissions.',url:'https://linuxjourney.com'},
{d:'Thu',t:'Users, groups, sudo + process management',det:'adduser, ps, top, kill, systemctl basics.',url:'https://linuxjourney.com'},
{d:'Fri',t:'OverTheWire Bandit levels 0–5',det:'Apply Linux skills. Solve CTF-style Linux challenges.',url:'https://overthewire.org/wargames/bandit/'},
]},
{label:'Week 2',topic:'Linux networking + shell basics',days:[
{d:'Mon',t:'Networking commands: ip, netstat, ss, curl',det:'Run each command. Map output to OSI model layers.',url:'https://linuxjourney.com'},
{d:'Tue',t:'Package management: apt, yum, dnf',det:'Install nginx, python3, git on Ubuntu VM.',url:'https://linuxjourney.com'},
{d:'Wed',t:'Text processing: grep, awk, sed, cut',det:'Parse a log file. Extract IPs, count errors.',url:'https://linuxjourney.com'},
{d:'Thu',t:'Shell scripting — Part 1: variables, loops',det:'Write 3 bash scripts: hello world, file backup, log parser.',url:'https://www.shellscript.sh'},
{d:'Fri',t:'OverTheWire Bandit levels 6–12',det:'Continue Bandit. Focus on grep, find, file redirection.',url:'https://overthewire.org/wargames/bandit/'},
]},
{label:'Week 3',topic:'Advanced shell scripting',days:[
{d:'Mon',t:'Shell scripting — conditionals + functions',det:'Write script: check if service is running, restart if not.',url:'https://www.shellscript.sh'},
{d:'Tue',t:'Cron jobs + scheduled tasks',det:'Schedule 3 cron jobs. Automate a log cleanup script.',url:'https://crontab.guru'},
{d:'Wed',t:'SSH + key-based authentication',det:'Generate SSH keys. Connect to a cloud VM without password.',url:'https://www.digitalocean.com/community/tutorials/ssh-essentials-working-with-ssh-servers-clients-and-keys'},
{d:'Thu',t:'Linux system monitoring: vmstat, iostat, df',det:'Monitor CPU, memory, disk. Write a health check script.',url:'https://linuxjourney.com'},
{d:'Fri',t:'OverTheWire Bandit levels 13–20',det:'Advanced Bandit. Focus on SSH, binary, permissions.',url:'https://overthewire.org/wargames/bandit/'},
]},
{label:'Week 4',topic:'Git & GitHub — version control',days:[
{d:'Mon',t:'Git init, add, commit, status, log',det:'Watch TechWorld Nana Git tutorial. Create first repo.',url:'https://www.youtube.com/watch?v=RGOj5yH7evk'},
{d:'Tue',t:'Git branching + merging + conflicts',det:'Create branches, merge, resolve a conflict.',url:'https://learngitbranching.js.org'},
{d:'Wed',t:'Git remote + push + pull + fetch',det:'Push local repo to GitHub. Clone a repo. Submit a PR.',url:'https://learngitbranching.js.org'},
{d:'Thu',t:'Git rebase + cherry-pick + stash',det:'Practice rebase vs merge. Use stash to save work.',url:'https://learngitbranching.js.org'},
{d:'Fri',t:'GitHub Actions intro — first workflow',det:'Create a simple GitHub Actions workflow that runs on push.',url:'https://docs.github.com/en/actions'},
]},
{label:'Week 5',topic:'Git workflows + advanced GitHub',days:[
{d:'Mon',t:'Git Flow vs Trunk Based Development',det:'Read about both workflows. Understand when to use each.',url:'https://www.atlassian.com/git/tutorials/comparing-workflows/gitflow-workflow'},
{d:'Tue',t:'GitHub: Issues, Projects, Pull Requests',det:'Open an issue, link a PR, merge with squash.',url:'https://docs.github.com/en/issues'},
{d:'Wed',t:'GitHub Actions — multi-step pipeline',det:'Build pipeline: checkout → test → build → notify.',url:'https://docs.github.com/en/actions'},
{d:'Thu',t:'Pre-commit hooks + linting automation',det:'Add pre-commit hooks using husky or shell scripts.',url:'https://pre-commit.com'},
{d:'Fri',t:'Review + push all week scripts to GitHub',det:'Create devops-scripts repo. Clean README for each.',url:'https://github.com'},
]},
{label:'Week 6',topic:'Python scripting for DevOps',days:[
{d:'Mon',t:'Python basics: variables, loops, functions',det:'Complete Python for DevOps intro on freeCodeCamp.',url:'https://www.freecodecamp.org/learn/scientific-computing-with-python/'},
{d:'Tue',t:'Python: file I/O + JSON + YAML parsing',det:'Write script to parse a YAML config and JSON API response.',url:'https://automatetheboringstuff.com'},
{d:'Wed',t:'Python: subprocess + os module',det:'Run shell commands from Python. Automate server checks.',url:'https://automatetheboringstuff.com'},
{d:'Thu',t:'Python: requests library + REST APIs',det:'Call a public REST API. Parse the response. Log results.',url:'https://docs.python-requests.org'},
{d:'Fri',t:'Python: boto3 intro (AWS SDK)',det:'Install boto3. List S3 buckets and EC2 instances (free tier).',url:'https://boto3.amazonaws.com/v1/documentation/api/latest/index.html'},
]},
{label:'Week 7',topic:'Networking fundamentals for DevOps',days:[
{d:'Mon',t:'TCP/IP, DNS, HTTP/S for DevOps context',det:'Understand how web requests flow through infra.',url:'https://www.cloudflare.com/learning/'},
{d:'Tue',t:'Load balancers + reverse proxies',det:'Install Nginx on VM. Configure as reverse proxy.',url:'https://nginx.org/en/docs/beginners_guide.html'},
{d:'Wed',t:'Firewalls + security groups + iptables',det:'Configure UFW on Ubuntu. Open/close ports.',url:'https://www.digitalocean.com/community/tutorials/ufw-essentials-common-firewall-rules-and-commands'},
{d:'Thu',t:'VPC + subnets + NAT (cloud networking)',det:'Read AWS VPC docs. Draw a basic 3-tier network diagram.',url:'https://docs.aws.amazon.com/vpc/latest/userguide/what-is-amazon-vpc.html'},
{d:'Fri',t:'Review Phase 1 foundations + quiz yourself',det:'Can you explain: SSH, git rebase, cron, chmod 755?',url:'https://github.com'},
]},
{label:'Week 8',topic:'Linux + Git revision + mini project',days:[
{d:'Mon',t:'Mini project: automated server setup script',det:'Write bash script: installs nginx, creates user, sets firewall.',url:'https://github.com'},
{d:'Tue',t:'Mini project: git-based deploy script',det:'Script that pulls latest git main branch and restarts nginx.',url:'https://github.com'},
{d:'Wed',t:'Mini project: system health monitor',det:'Python script: checks CPU, disk, memory. Emails alert if high.',url:'https://github.com'},
{d:'Thu',t:'Push all 3 mini projects to GitHub',det:'Add README with architecture diagram description.',url:'https://github.com'},
{d:'Fri',t:'Review + fill gaps from weeks 1–8',det:'Re-read notes. List 5 things you still feel unsure about.',url:'https://linuxjourney.com'},
]},
]},

{id:'p2',label:'Phase 2',name:'Docker & containerisation',months:'Month 3–4 (Weeks 9–16)',color:'#534AB7',bg:'#EEEDFE',tc:'#3C3489',
stats:['Docker fundamentals','Docker Compose','Container networking','Registry & images'],
weeks:[
{label:'Week 9',topic:'Docker fundamentals',days:[
{d:'Mon',t:'What is Docker + containers vs VMs',det:'Watch TechWorld Nana Docker tutorial part 1.',url:'https://www.youtube.com/watch?v=3c-iBn73dDE'},
{d:'Tue',t:'Docker install + first container',det:'Install Docker on Ubuntu VM. Run hello-world and nginx.',url:'https://docs.docker.com/get-started/'},
{d:'Wed',t:'Docker images + containers + layers',det:'Pull, run, stop, rm containers. Inspect image layers.',url:'https://docs.docker.com/get-started/'},
{d:'Thu',t:'Docker run flags: -p, -v, -e, -d, --name',det:'Run nginx with port mapping. Mount a volume.',url:'https://docs.docker.com/engine/reference/run/'},

{d:'Tue',t:'Dockerfile best practices + multi-stage builds',det:'Reduce image size using multi-stage. Compare before/after.',url:'https://docs.docker.com/develop/develop-images/multistage-build/'},
{d:'Wed',t:'Docker build + tag + push to Docker Hub',det:'Create Docker Hub account. Push your Flask image.',url:'https://hub.docker.com'},
{d:'Thu',t:'Docker networking: bridge, host, overlay',det:'Create custom networks. Connect 2 containers.',url:'https://docs.docker.com/network/'},
{d:'Fri',t:'Docker volumes + bind mounts + tmpfs',det:'Persist MySQL data with a named volume.',url:'https://docs.docker.com/storage/volumes/'},

{label:'Week 11',topic:'Docker Compose',days:[

{d:'Tue',t:'Docker Compose: multi-container app',det:'Run WordPress + MySQL using docker-compose.yml.',url:'https://docs.docker.com/compose/'},
{d:'Wed',t:'Docker Compose: networks + volumes + env vars',det:'Add custom networks and named volumes to Compose file.',url:'https://docs.docker.com/compose/compose-file/'},
{d:'Thu',t:'Docker Compose: health checks + depends_on',det:'Add health check to MySQL. Make app wait for DB ready.',url:'https://docs.docker.com/compose/compose-file/compose-file-v3/'},

{d:'Tue',t:'Trivy image scanning',det:'Install Trivy free. Scan your images for CVEs.',url:'https://github.com/aquasecurity/trivy'},

{d:'Thu',t:'Docker resource limits: CPU + memory',det:'Set --cpus and --memory limits. Test with stress tool.',url:'https://docs.docker.com/config/containers/resource_constraints/'},

]},

]},
{label:'Week 15',topic:'Kubernetes — RBAC + Helm',days:[

{label:'Week 16',topic:'Docker + K8s revision + portfolio',days:[
{d:'Mon',t:'Kubernetes troubleshooting commands',det:'kubectl describe, logs, exec, events. Debug a broken pod.',url:'https://kubernetes.io/docs/tasks/debug/'},
{d:'Tue',t:'Horizontal Pod Autoscaler (HPA)',det:'Configure HPA. Run load test to trigger scaling.',url:'https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/'},
{d:'Wed',t:'K8s network policies',det:'Restrict pod-to-pod traffic using NetworkPolicy.',url:'https://kubernetes.io/docs/concepts/services-networking/network-policies/'},
{d:'Thu',t:'Write Docker + K8s project README',det:'Document your full containerised project on GitHub.',url:'https://github.com'},
{d:'Fri',t:'Phase 2 review + GitHub portfolio check',det:'Ensure: Dockerfile, Compose, K8s YAMLs, Helm chart all pushed.',url:'https://github.com'},

{id:'p3',label:'Phase 3',name:'CI/CD — Jenkins & GitHub Actions',months:'Month 5–6 (Weeks 17–24)',color:'#BA7517',bg:'#FAEEDA',tc:'#633806',
stats:['Jenkins pipelines','GitHub Actions','SonarQube','Nexus + Artifactory'],
weeks:[
{label:'Week 17',topic:'CI/CD concepts + Jenkins install',days:[
{d:'Mon',t:'What is CI/CD + SDLC automation',det:'Watch TechWorld Nana Jenkins intro. Understand pipeline stages.',url:'https://www.youtube.com/watch?v=LFDrDnKPOTg'},

{label:'Week 21',topic:'GitLab CI/CD',days:[
{d:'Mon',t:'GitLab CI intro + .gitlab-ci.yml',det:'Create free GitLab account. Write first .gitlab-ci.yml.',url:'https://docs.gitlab.com/ee/ci/quick_start/'},
{d:'Tue',t:'GitLab CI: stages, jobs, artifacts',det:'Multi-stage pipeline: build → test → package.',url:'https://docs.gitlab.com/ee/ci/yaml/'},
{d:'Wed',t:'GitLab CI: Docker in Docker (DinD)',det:'Build and push Docker image inside GitLab CI.',url:'https://docs.gitlab.com/ee/ci/docker/using_docker_build.html'},

{d:'Mon',t:'Unit testing + pytest in pipeline',det:'Add pytest to your Python app. Run in GitHub Actions.',url:'https://docs.pytest.org'},

const completed=JSON.parse(localStorage.getItem('devops_v1')||'{}');
let cp=0,open={},syncState='idle';

function totalDays(){return PHASES.reduce((s,p)=>s+p.weeks.reduce((a,w)=>a+w.days.length,0),0);}
function doneCount(){return Object.values(completed).filter(Boolean).length;}
function key(pi,wi,di){return `${pi}_${wi}_${di}`;}

async function saveToSheet(k,pi,wi,di,done){
  syncState='saving';render();
  try{
    const url=`${SCRIPT_URL}?action=set&key=${encodeURIComponent(k)}&phase=${pi}&week=${wi}&day=${di}&done=${done}`;
    await Promise.race([fetch(url).then(r=>r.json()),new Promise((_,rej)=>setTimeout(()=>rej(),8000))]);
    syncState='ok';
  }catch(e){syncState='err';}
  render();
}

async function loadFromSheet(){
  syncState='loading';render();
  try{
    const data=await Promise.race([
      fetch(SCRIPT_URL+'?action=getAll').then(r=>r.json()),
      new Promise((_,rej)=>setTimeout(()=>rej(),8000))
    ]);
    Object.assign(completed,data||{});
    localStorage.setItem('devops_v1',JSON.stringify(completed));
    syncState='ok';
  }catch(e){syncState='err';}
  render();
}

async function toggleDone(pi,wi,di,e){
  e.stopPropagation();
  const k=key(pi,wi,di);
  completed[k]=!completed[k];
  try{localStorage.setItem('devops_v1',JSON.stringify(completed));}catch(e2){}
  await saveToSheet(k,pi,wi,di,completed[k]);
}

function toggleWeek(wi){open[`${cp}_${wi}`]=!open[`${cp}_${wi}`];render();}

function render(){
  const p=PHASES[cp];
  const total=totalDays();
  const done=doneCount();
  const pct=Math.round(done/total*100);
  const syncLabel=syncState==='loading'?'Loading from Google Sheets…':syncState==='saving'?'Saving…':syncState==='ok'?'Synced to Google Sheets':syncState==='err'?'Offline — saved locally':'';
  const syncColor=syncState==='ok'?'#3B6D11':syncState==='err'?'#BA7517':'#5f5e5a';
  const syncBg=syncState==='ok'?'#eaf3de':syncState==='err'?'#faeeda':'#f5f5f0';

  let h='<h1>DevOps Engineer — 12 Month Plan</h1>';
  h+='<div class="subtitle">Weekdays only · 1.5 hrs/day · 100% free resources · Linux → Docker → K8s → CI/CD → Terraform → CKA + AWS SAA</div>';
  if(syncLabel) h+=`<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:8px;margin-bottom:12px;background:${syncBg};color:${syncColor}"><span style="width:7px;height:7px;border-radius:50%;background:${syncColor};display:inline-block"></span>${syncLabel}</div>`;

  h+=`<div class="progress-wrap"><div class="progress-label"><span>${done} of ${total} days completed</span><span>${pct}%</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div></div>`;

  h+=`<div class="top-bar">`;
  PHASES.forEach((ph,i)=>{h+=`<span class="phase-pill ${ph.id}${i===cp?' active':''}" onclick="setPhase(${i})">${ph.label}</span>`;});
  h+=`</div>`;

  h+=`<div class="phase-hero" style="background:${p.bg};border-color:${p.color}33">`;
  h+=`<div class="phase-hero-title" style="color:${p.color}">${p.name}</div>`;
  h+=`<div class="phase-hero-meta" style="color:${p.tc}">${p.months}</div>`;
  h+=`<div class="stats-row">`;
  p.stats.forEach(s=>{h+=`<span class="stat-chip" style="background:${p.color}22;color:${p.tc}">${s}</span>`;});
  h+=`</div></div>`;

  h+=`<div class="weeks-grid">`;
  p.weeks.forEach((w,wi)=>{
    const isOpen=!!open[`${cp}_${wi}`];
    const weekDone=w.days.filter((_,di)=>completed[key(cp,wi,di)]).length;
    h+=`<div class="week-block"><div class="week-header-row" onclick="toggleWeek(${wi})">`;
    h+=`<div><div class="week-title">${w.label} — ${w.topic}</div><div class="week-subtitle">${weekDone}/${w.days.length} days done</div></div>`;
    h+=`<span class="week-toggle">${isOpen?'▲':'▼'}</span></div>`;
    h+=`<div class="days-list${isOpen?' open':''}">`;
    w.days.forEach((d,di)=>{
      const k=key(cp,wi,di);
      const isDone=!!completed[k];
      h+=`<div class="day-item" style="opacity:${isDone?0.5:1}">`;
      h+=`<div class="day-label">${d.d}</div>`;
      h+=`<div><div class="day-topic">${d.t}</div><div class="day-detail">${d.det}</div><a class="day-link" href="${d.url}" target="_blank">Open resource →</a></div>`;
      h+=`<div><button class="done-btn${isDone?' done':''}" onclick="toggleDone(${cp},${wi},${di},event)">${isDone?'Done':'Mark done'}</button></div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
}

function setPhase(i){cp=i;open={};render();}
loadFromSheet();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
</html>
